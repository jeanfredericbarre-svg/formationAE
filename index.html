<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation After Effects - 2026</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* --- Typographie --- */
  body {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    line-height: 1;
  }

    /* --- Couleurs principales --- */
    :root {
      --theme-color: #9999FF;
    }

    /* --- Liens --- */
    a {
      color: #6666CC;
      text-decoration: none;
    }
    a:hover {
      color: #9999FF;
      text-decoration: none;
    }

    /* --- Titres --- */
    h1, h2, h3 {
      color: #3333AA;
      font-weight: 600;
    }
    h1 {
      border-bottom: 3px solid #9999FF;
      border-left: 12px solid #9999FF;
      padding-bottom: 0.3em;
    }
    h2 {
      border-bottom: 1px solid #ccccff;
      padding-bottom: 0.2em;
      background-color: #fffde7;
      padding: 0.4em 0.6em 0.2em 0.6em;
      border-radius: 4px;
    }

    /* --- Largeur du contenu --- */
    .markdown-section {
      max-width: 90% !important;
    }

    /* --- Sidebar --- */
    .sidebar {
      background-color: #f5f5ff;
      border-right: 2px solid #9999FF;
      width: 350px !important;
    }
    .sidebar ul li {
      line-height: 1.5em !important;
      margin: 0 !important;
      padding: 0 !important;
    }    
    .sidebar ul li a {
      color: #3333AA;
    }
    .sidebar ul li a:hover {
      color: #9999FF;
    }
    .sidebar ul li.active > a {
      color: #9999FF;
      font-weight: bold;
    }

    /* --- Nom du site en haut de sidebar --- */
    .app-name-link {
      color: #1b1830 !important;
      font-weight: 700;
      font-size: 1.1em;
    }

    .content {
    left: 350px !important;
    }

/* --- Blocs de code --- */
code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: #1e1e2e !important;
  color: #cdd6f4 !important;
  border-radius: 4px !important;
  padding: 2px 6px !important;
  font-size: 0.9em !important;
}
pre {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: #1e1e2e !important;
  border-left: 10px solid #6666CC !important;
  border-radius: 7px !important;
  padding: 1em 1.2em !important;
}
pre code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: transparent !important;
  color: #cdd6f4 !important;
  padding: 0 !important;
  font-size: 0.88em !important;
  box-shadow: none !important;
}
.markdown-section pre {
  background-color: #1e1e2e !important;
}
.markdown-section code {
  background-color: #1e1e2e !important;
  color: #cdd6f4 !important;
}
.markdown-section pre > code {
  background-color: transparent !important;
  color: #cdd6f4 !important;
  box-shadow: none !important;
}


    /* --- Barre de progression --- */
    #nprogress .bar {
      background: #9999FF !important;
    }

    /* --- Bloc téléchargement projet AE --- */
    .ae-download {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background-color: #f0f0ff;
      border-left: 4px solid #6666CC;
      border-radius: 0 8px 8px 0;
      margin: 1.8em 0;
    }
    .ae-download__icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      background-color: #e0e0ff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }
    .ae-download__body {
      flex: 1;
      min-width: 0;
    }
    .ae-download__label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #6666CC;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .ae-download__name {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #3333AA;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ae-download__desc {
      display: block;
      font-size: 12px;
      color: #555577;
      margin-top: 2px;
    }
    .ae-download__btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background-color: #6666CC;
      color: #ffffff !important;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      text-decoration: none !important;
      white-space: nowrap;
      transition: background-color 0.15s;
    }
    .ae-download__btn:hover {
      background-color: #9999FF !important;
      color: #ffffff !important;
    }
    .ae-download__btn::before {
      content: '↓';
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Formation After Effects',
      loadSidebar: true,
      basePath: '/formationAE/',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
