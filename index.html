<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation After Effects - 2026</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    /* --- Typographie --- */
  body {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    line-height: 1;
  }

    /* --- Couleurs principales --- */
    :root {
      --theme-color: #9999FF;
    }

    /* --- Liens --- */
    a {
      color: #6666CC;
      text-decoration: none;
    }
    a:hover {
      color: #9999FF;
      text-decoration: none;
    }

    /* --- Titres --- */
    h1, h2, h3 {
      font-family: 'Barlow Condensed', 'Nunito', sans-serif;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    h1 {
      color: #1a1a2e;
      font-size: 2.2em;
      text-transform: uppercase;
      border-bottom: none;
      border-left: 8px solid #E63030;
      padding-bottom: 0.2em;
      padding-left: 14px;
      margin-bottom: 0.8em;
    }
    h2 {
      color: #3333AA;
      font-size: 1.35em;
      text-transform: uppercase;
      background: none;
      border-bottom: none;
      border-radius: 0;
      padding: 0.3em 0 0.3em 1.4em;
      position: relative;
      margin-top: 1.8em;
    }
    h2::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 7px 0 7px 11px;
      border-color: transparent transparent transparent #E63030;
    }
    h3 {
      color: #3333AA;
      font-size: 1.1em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* --- Largeur du contenu --- */
    .markdown-section {
      max-width: 90% !important;
    }

    /* --- Sidebar --- */
    .sidebar {
      background-color: #f5f5ff;
      border-right: 2px solid #9999FF;
      width: 350px !important;
    }
    .sidebar ul li {
      line-height: 1.5em !important;
      margin: 0 !important;
      padding: 0 !important;
    }    
    .sidebar ul li a {
      color: #3333AA;
    }
    .sidebar ul li a:hover {
      color: #9999FF;
    }
    .sidebar ul li.active > a {
      color: #9999FF;
      font-weight: bold;
    }

    /* --- Nom du site en haut de sidebar --- */
    .app-name-link {
      color: #1b1830 !important;
      font-weight: 700;
      font-size: 1.1em;
    }

    .content {
    left: 350px !important;
    }

/* --- Blocs de code --- */
code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: #1e1e2e !important;
  color: #cdd6f4 !important;
  border-radius: 4px !important;
  padding: 2px 6px !important;
  font-size: 0.9em !important;
}
pre {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: #1e1e2e !important;
  border-left: 10px solid #E63030 !important;
  border-radius: 7px !important;
  padding: 1em 1.2em !important;
}
pre code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: transparent !important;
  color: #cdd6f4 !important;
  padding: 0 !important;
  font-size: 0.88em !important;
  box-shadow: none !important;
}
.markdown-section pre {
  background-color: #1e1e2e !important;
}
.markdown-section code {
  background-color: #1e1e2e !important;
  color: #cdd6f4 !important;
}
.markdown-section pre > code {
  background-color: transparent !important;
  color: #cdd6f4 !important;
  box-shadow: none !important;
}


    /* --- Barre de progression --- */
    #nprogress .bar {
      background: #9999FF !important;
    }

    /* --- Décorations géométriques header / footer --- */

    /* Conteneur des triangles SVG — header */
    .deco-header,
    .deco-footer {
      position: fixed;
      left: 350px;
      right: 0;
      height: 90px;
      overflow: hidden;
      pointer-events: none;
      z-index: 100;
    }
    .deco-header { top: 0; }
    .deco-footer { bottom: 0; }

    .deco-header svg,
    .deco-footer svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* --- Blocs callout 💡 (blockquote commençant par 💡) --- */
    .markdown-section blockquote {
      border-left: 4px solid #E63030;
      background-color: #fff8f8;
      border-radius: 0 6px 6px 0;
      padding: 0.8em 1.2em;
      margin: 1.5em 0;
      color: #333;
    }
    .markdown-section blockquote p:first-child {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.05em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #E63030;
      margin-bottom: 0.3em;
    }
    .markdown-section blockquote p {
      margin: 0;
      line-height: 1.5;
      font-size: 0.95em;
    }

    /* --- Bloc téléchargement projet AE --- */
    .ae-download {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background-color: #f0f0ff;
      border-left: 4px solid #6666CC;
      border-radius: 0 8px 8px 0;
      margin: 1.8em 0;
    }
    .ae-download__icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      background-color: #e0e0ff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }
    .ae-download__body {
      flex: 1;
      min-width: 0;
    }
    .ae-download__label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #6666CC;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .ae-download__name {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #3333AA;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ae-download__desc {
      display: block;
      font-size: 12px;
      color: #555577;
      margin-top: 2px;
    }
    .ae-download__btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background-color: #6666CC;
      color: #ffffff !important;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      text-decoration: none !important;
      white-space: nowrap;
      transition: background-color 0.15s;
    }
    .ae-download__btn:hover {
      background-color: #9999FF !important;
      color: #ffffff !important;
    }
    .ae-download__btn::before {
      content: '↓';
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <!-- Décorations géométriques header -->
  <div class="deco-header" aria-hidden="true">
    <svg viewBox="0 0 1440 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Triangle principal — coin gauche, plein -->
      <polygon points="0,0 180,0 0,90" fill="rgba(230,48,48,0.85)"/>
      <!-- Triangle décalé derrière — plus grand, semi-transparent -->
      <polygon points="0,0 280,0 0,90" fill="rgba(230,48,48,0.25)"/>
      <!-- Triangle fin effilé à droite du premier -->
      <polygon points="140,0 320,0 140,90" fill="rgba(230,48,48,0.12)"/>
      <!-- Petit triangle coin droit -->
      <polygon points="1440,0 1260,0 1440,90" fill="rgba(230,48,48,0.55)"/>
      <!-- Triangle moyen derrière celui de droite -->
      <polygon points="1440,0 1150,0 1440,90" fill="rgba(230,48,48,0.18)"/>
      <!-- Triangle très fin encore plus à gauche à droite -->
      <polygon points="1440,0 1060,0 1440,55" fill="rgba(230,48,48,0.09)"/>
      <!-- Barre rouge top -->
      <rect x="0" y="0" width="1440" height="6" fill="#E63030"/>
    </svg>
  </div>

  <!-- Décorations géométriques footer -->
  <div class="deco-footer" aria-hidden="true">
    <svg viewBox="0 0 1440 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Triangle principal bas gauche -->
      <polygon points="0,90 200,90 0,0" fill="rgba(230,48,48,0.80)"/>
      <!-- Triangle derrière -->
      <polygon points="0,90 320,90 0,0" fill="rgba(230,48,48,0.22)"/>
      <!-- Triangle effilé -->
      <polygon points="160,90 380,90 160,30" fill="rgba(230,48,48,0.10)"/>
      <!-- Triangle bas droit -->
      <polygon points="1440,90 1240,90 1440,0" fill="rgba(230,48,48,0.60)"/>
      <!-- Triangle derrière droit -->
      <polygon points="1440,90 1100,90 1440,0" fill="rgba(230,48,48,0.20)"/>
      <!-- Triangle très léger encore plus large -->
      <polygon points="1440,90 980,90 1440,40" fill="rgba(230,48,48,0.08)"/>
      <!-- Barre rouge bottom -->
      <rect x="0" y="84" width="1440" height="6" fill="#E63030"/>
    </svg>
  </div>

  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Formation After Effects',
      loadSidebar: true,
      basePath: '/formationAE/',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
