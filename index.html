<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation After Effects - 2026</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    /* --- Typographie --- */
    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    }

    /* --- Couleurs principales --- */
    :root {
      --theme-color: #9999FF;
    }

    /* --- Liens --- */
    a {
      color: #6666CC;
    }
    a:hover {
      color: #9999FF;
    }

    /* --- Titres --- */
    h1, h2, h3 {
      color: #3333AA;
      font-weight: 600;
    }
    h1 {
      border-bottom: 3px solid #9999FF;
      padding-bottom: 0.3em;
    }
    h2 {
      border-bottom: 1px solid #ccccff;
      padding-bottom: 0.2em;
    }

    /* --- Largeur du contenu --- */
    .markdown-section {
      max-width: 90% !important;
    }

    /* --- Sidebar --- */
    .sidebar {
      background-color: #f5f5ff;
      border-right: 2px solid #9999FF;
    }
    .sidebar ul li a {
      color: #3333AA;
    }
    .sidebar ul li a:hover {
      color: #9999FF;
    }
    .sidebar ul li.active > a {
      color: #9999FF;
      font-weight: bold;
    }

    /* --- Nom du site en haut de sidebar --- */
    .app-name-link {
      color: #1b1830 !important;
      font-weight: 700;
      font-size: 1.1em;
    }

/* --- Blocs de code --- */
code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  background-color: #1e1e2e;
  color: #cdd6f4;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.9em;
}
pre {
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
  background-color: #1e1e2e !important;
  border-left: 3px solid #6666CC;
  border-radius: 4px;
  padding: 1em 1.2em !important;
}
pre code {
  background-color: transparent;
  color: #cdd6f4;
  padding: 0;
  font-size: 0.88em;
}

    /* --- Barre de progression --- */
    #nprogress .bar {
      background: #9999FF !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Formation After Effects',
      loadSidebar: true,
      basePath: '/formationAE/',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
